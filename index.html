<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Flutter — Lanchonete Express</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --card: #131316;
    --card2: #1a1a1f;
    --border: #26262c;
    --texto: #e4e4e7;
    --dim: #8b8b93;
    --verde: #22c55e;
    --verde-soft: rgba(34, 197, 94, 0.12);
    --vermelho: #ef4444;
    --vermelho-soft: rgba(239, 68, 68, 0.12);
    --azul: #60a5fa;
    --amarelo: #fbbf24;
    --laranja: #fb923c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 50% -20%, rgba(34,197,94,0.07), transparent 60%);
    color: var(--texto);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .app { width: 100%; max-width: 760px; }

  .barra-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .barra {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--verde), #86efac);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .topo .placar { color: var(--verde); font-weight: 600; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    animation: entrar 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes entrar {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero h1 { font-size: 1.5rem; font-weight: 800; line-height: 1.3; }
  .hero h1 span { color: var(--verde); }
  .hero .desc { color: var(--dim); font-size: 0.85rem; margin: 14px 0 20px; line-height: 1.6; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
  .chip {
    font-size: 0.7rem;
    color: var(--dim);
    background: var(--card2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 99px;
  }

  /* ---------- seletor de modo ---------- */
  .modos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; }
  @media (max-width: 560px) { .modos { grid-template-columns: 1fr; } }
  .modo {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 14px;
    cursor: pointer;
    font-family: inherit;
    color: var(--texto);
    text-align: left;
    transition: border-color 0.15s, transform 0.1s;
  }
  .modo:hover { transform: translateY(-2px); }
  .modo .m-icone { font-size: 1.3rem; display: block; margin-bottom: 8px; }
  .modo .m-nome { font-weight: 800; font-size: 0.9rem; display: block; margin-bottom: 4px; }
  .modo .m-desc { font-size: 0.68rem; color: var(--dim); line-height: 1.5; display: block; }
  .modo.facil:hover   { border-color: var(--verde); }
  .modo.facil .m-nome { color: var(--verde); }
  .modo.medio:hover   { border-color: var(--laranja); }
  .modo.medio .m-nome { color: var(--laranja); }
  .modo.dificil:hover   { border-color: var(--vermelho); }
  .modo.dificil .m-nome { color: var(--vermelho); }

  .tema {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--verde);
    background: var(--verde-soft);
    border: 1px solid rgba(34,197,94,0.3);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 16px;
  }
  .pergunta { font-size: 0.95rem; line-height: 1.65; margin-bottom: 22px; }
  .pergunta b { color: var(--amarelo); }
  code {
    background: #202027;
    padding: 2px 6px;
    border-radius: 5px;
    color: var(--azul);
    font-size: 0.85em;
    font-family: inherit;
  }
  pre {
    background: #0c0c0f;
    border: 1px solid var(--border);
    border-left: 3px solid var(--verde);
    border-radius: 8px;
    padding: 14px;
    margin: 14px 0 4px;
    overflow-x: auto;
    font-size: 0.78rem;
    line-height: 1.6;
    color: #bae6fd;
  }

  .opcao {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--texto);
    font-family: inherit;
    font-size: 0.83rem;
    line-height: 1.55;
    padding: 13px 15px;
    border-radius: 10px;
    margin-bottom: 9px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, background 0.15s;
  }
  .opcao:hover:not(:disabled) {
    border-color: var(--verde);
    transform: translateX(3px);
  }
  .opcao:disabled { cursor: default; }
  .letra {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .opcao:hover:not(:disabled) .letra { color: var(--verde); border-color: var(--verde); }
  .opcao.correta { border-color: var(--verde); background: var(--verde-soft); }
  .opcao.correta .letra { background: var(--verde); border-color: var(--verde); color: #052e16; }
  .opcao.errada { border-color: var(--vermelho); background: var(--vermelho-soft); }
  .opcao.errada .letra { background: var(--vermelho); border-color: var(--vermelho); color: #450a0a; }
  .opcao.apagada { opacity: 0.45; }

  .explicacao {
    display: none;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--verde);
    border-radius: 8px;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--dim);
    animation: entrar 0.3s ease;
  }
  .explicacao .tag { color: var(--verde); font-weight: 800; margin-right: 6px; }
  .explicacao.err .tag { color: var(--vermelho); }
  .explicacao.err { border-left-color: var(--vermelho); }

  .botao {
    display: none;
    margin-top: 20px;
    background: var(--verde);
    color: #052e16;
    border: none;
    font-family: inherit;
    font-weight: 800;
    font-size: 0.85rem;
    padding: 13px 28px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.15s;
  }
  .botao:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .botao.mostrar { display: inline-block; animation: entrar 0.3s ease; }
  .botao.secundario {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
    margin-left: 8px;
  }
  .botao.secundario:hover { color: var(--texto); border-color: var(--dim); }
  .dica-teclado { font-size: 0.68rem; color: #55555c; margin-top: 14px; }

  .resultado { text-align: center; }
  .anel {
    width: 140px; height: 140px;
    margin: 10px auto 18px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(closest-side, var(--card) 82%, transparent 83%),
      conic-gradient(var(--verde) calc(var(--pct) * 1%), var(--border) 0);
  }
  .anel .num { font-size: 1.8rem; font-weight: 800; color: var(--verde); }
  .anel .sub { font-size: 0.7rem; color: var(--dim); }
  .veredito { color: var(--texto); font-size: 0.95rem; margin-bottom: 4px; font-weight: 600; }
  .veredito-sub { color: var(--dim); font-size: 0.8rem; margin-bottom: 24px; }

  .revisao { text-align: left; margin-top: 8px; }
  .revisao h3 {
    font-size: 0.8rem;
    color: var(--vermelho);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .rev-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--vermelho);
    border-radius: 8px;
    padding: 13px 15px;
    margin-bottom: 9px;
    font-size: 0.78rem;
    line-height: 1.6;
  }
  .rev-item .q { color: var(--texto); margin-bottom: 6px; }
  .rev-item .r { color: var(--dim); }
  .rev-item .r b { color: var(--verde); font-weight: 600; }
</style>
</head>
<body>
<div class="app">
  <div class="barra-wrap"><div class="barra" id="barra"></div></div>
  <div class="topo">
    <span id="contador"></span>
    <span class="placar" id="placar"></span>
  </div>
  <div class="card" id="card"></div>
</div>

<script>
  /* =========================== MODO FÁCIL =========================== */
  const facil = [
    {
      tema: "Scaffold",
      pergunta: "O que é o <code>Scaffold</code> no Flutter?",
      opcoes: [
        "Um widget que fornece a estrutura básica de uma tela Material Design, com espaços para AppBar, body, FloatingActionButton etc.",
        "Uma função que compila o código Dart.",
        "Um banco de dados local do Flutter.",
        "Um pacote externo que precisa ser instalado com <code>pub add</code>."
      ],
      correta: 0,
      explicacao: "O <code>Scaffold</code> é o \"esqueleto\" da tela: AppBar em cima, body no meio, FAB, Drawer etc."
    },
    {
      tema: "Scaffold",
      pergunta: "Qual propriedade do <code>Scaffold</code> define o conteúdo principal da tela?",
      opcoes: [
        "<code>appBar</code>",
        "<code>body</code>",
        "<code>home</code>",
        "<code>child</code>"
      ],
      correta: 1,
      explicacao: "O conteúdo principal vai no <code>body</code>. <code>appBar</code> é a barra do topo e <code>home</code> é do <code>MaterialApp</code>."
    },
    {
      tema: "Stateless × Stateful",
      pergunta: "Você precisa de uma tela com um contador que muda quando o usuário aperta um botão. Qual tipo de widget usar?",
      opcoes: [
        "<code>StatelessWidget</code>, porque é mais simples.",
        "<code>StatefulWidget</code>, porque a tela precisa mudar de estado (o valor do contador) durante a execução.",
        "Nenhum, contadores não existem em Flutter.",
        "<code>Scaffold</code>, que já vem com contador embutido."
      ],
      correta: 1,
      explicacao: "Se algo na tela muda com o tempo ou com interação, é <code>StatefulWidget</code>."
    },
    {
      tema: "setState",
      pergunta: "De forma simples, o que o <code>setState()</code> faz?",
      opcoes: [
        "Avisa o Flutter que o estado mudou, fazendo a tela ser redesenhada com os novos valores.",
        "Salva os dados no celular permanentemente.",
        "Fecha o aplicativo.",
        "Cria uma nova tela."
      ],
      correta: 0,
      explicacao: "<code>setState</code> = \"ei Flutter, mudei algo, redesenha a tela\"."
    },
    {
      tema: "Navigator",
      pergunta: "Qual comando abre uma nova tela no Flutter?",
      opcoes: [
        "<code>Navigator.push(context, MaterialPageRoute(builder: (context) =&gt; NovaTela()))</code>",
        "<code>openScreen(NovaTela())</code>",
        "<code>setState(NovaTela())</code>",
        "<code>Scaffold.push(NovaTela())</code>"
      ],
      correta: 0,
      explicacao: "<code>Navigator.push</code> com <code>MaterialPageRoute</code> é a forma padrão de navegar."
    },
    {
      tema: "Navigator",
      pergunta: "E para voltar para a tela anterior?",
      opcoes: [
        "<code>Navigator.pop(context)</code>",
        "<code>Navigator.back(context)</code>",
        "<code>Navigator.return(context)</code>",
        "<code>context.close()</code>"
      ],
      correta: 0,
      explicacao: "<code>pop</code> remove a tela atual da pilha e volta para a anterior."
    },
    {
      tema: "TextEditingController",
      pergunta: "Para que serve o <code>TextEditingController</code>?",
      opcoes: [
        "Para ler e controlar o texto digitado em um <code>TextField</code> (ex.: pegar o nome do cliente com <code>controller.text</code>).",
        "Para controlar o volume do celular.",
        "Para editar o código Dart em tempo de execução.",
        "Para criar animações de texto."
      ],
      correta: 0,
      explicacao: "É a ponte entre o campo de texto e o seu código: <code>meuController.text</code> retorna o que foi digitado."
    },
    {
      tema: "SnackBar",
      pergunta: "O que é um <code>SnackBar</code>?",
      opcoes: [
        "Uma mensagem temporária que aparece na parte de baixo da tela (ex.: \"Pedido enviado!\") e some sozinha.",
        "Uma barra de rolagem lateral.",
        "O menu principal do aplicativo.",
        "Um tipo de botão flutuante."
      ],
      correta: 0,
      explicacao: "SnackBar é aquele aviso rápido que sobe na base da tela e desaparece depois de alguns segundos."
    },
    {
      tema: "ListView",
      pergunta: "Qual widget é o mais indicado para exibir uma lista rolável de produtos do cardápio?",
      opcoes: [
        "<code>ListView</code>",
        "<code>Text</code>",
        "<code>AppBar</code>",
        "<code>FloatingActionButton</code>"
      ],
      correta: 0,
      explicacao: "<code>ListView</code> exibe itens em lista com rolagem automática."
    },
    {
      tema: "BottomSheet",
      pergunta: "O que o <code>showModalBottomSheet</code> faz?",
      opcoes: [
        "Abre um painel que desliza de baixo para cima na tela (ex.: detalhes do pedido), bloqueando o conteúdo atrás até ser fechado.",
        "Mostra uma barra de navegação fixa no rodapé.",
        "Reinicia o aplicativo.",
        "Exibe uma imagem em tela cheia."
      ],
      correta: 0,
      explicacao: "É aquele painel deslizante da parte de baixo, muito usado pra confirmações e detalhes."
    }
  ];

  /* =========================== MODO MÉDIO =========================== */
  const medio = [
    {
      tema: "Stateful · estrutura",
      pergunta: "Em um <code>StatefulWidget</code>, onde as variáveis de estado (ex.: <code>int total = 0;</code>) devem ser declaradas?",
      opcoes: [
        "Na classe que estende <code>State</code> (ex.: <code>_MinhaTelaState</code>), pois é ela que persiste entre os rebuilds.",
        "Na classe que estende <code>StatefulWidget</code>, pois é ela que representa a tela.",
        "Dentro do método <code>build()</code>, para serem recriadas a cada frame.",
        "No arquivo <code>pubspec.yaml</code>."
      ],
      correta: 0,
      explicacao: "O widget é recriado a cada rebuild; o objeto <code>State</code> permanece — por isso o estado mora nele. Declarar dentro do <code>build()</code> zeraria o valor a cada redesenho."
    },
    {
      tema: "setState",
      pergunta: "Um aluno fez <code>total++;</code> no <code>onPressed</code> do botão, mas <b>sem</b> chamar <code>setState</code>. O que acontece?",
      opcoes: [
        "A variável <code>total</code> muda na memória, mas a tela não atualiza, pois o <code>build()</code> não é executado de novo.",
        "O app trava com exceção.",
        "A tela atualiza normalmente, <code>setState</code> é opcional.",
        "O valor de <code>total</code> nem chega a mudar."
      ],
      correta: 0,
      explicacao: "Sem <code>setState</code>, o Flutter não sabe que precisa redesenhar — o valor muda \"por dentro\" mas a UI fica congelada no valor antigo."
    },
    {
      tema: "Navigator · dados",
      pergunta: "Qual a forma mais comum de <b>enviar</b> dados (ex.: o produto escolhido) para a próxima tela?",
      opcoes: [
        "Passando pelo construtor da tela de destino: <code>MaterialPageRoute(builder: (context) =&gt; Detalhes(produto: p))</code>.",
        "Usando <code>Navigator.pop</code> antes do <code>push</code>.",
        "Gravando em um arquivo .txt e lendo na outra tela.",
        "Não é possível passar dados entre telas no Flutter."
      ],
      correta: 0,
      explicacao: "A tela de destino recebe os dados como parâmetro do construtor — o jeito mais direto e comum."
    },
    {
      tema: "Navigator · retorno",
      pergunta: "A tela de detalhes fecha com <code>Navigator.pop(context, \"confirmado\")</code>. O que a string <code>\"confirmado\"</code> representa?",
      opcoes: [
        "É o valor devolvido para a tela anterior, que pode capturá-lo com <code>await</code> no <code>Navigator.push</code>.",
        "É o nome da rota que será fechada.",
        "É o título da próxima tela.",
        "Não representa nada, <code>pop</code> ignora o segundo argumento."
      ],
      correta: 0,
      explicacao: "O segundo argumento do <code>pop</code> vira o resultado do <code>Future</code> retornado pelo <code>push</code>."
    },
    {
      tema: "TextEditingController",
      pergunta: "Qual é o par correto de \"onde criar\" e \"onde descartar\" um <code>TextEditingController</code>?",
      opcoes: [
        "Criar como atributo do <code>State</code> (ou no <code>initState</code>) e descartar no <code>dispose()</code> com <code>controller.dispose()</code>.",
        "Criar dentro do <code>build()</code> e descartar no <code>setState()</code>.",
        "Criar no <code>main()</code> e nunca descartar.",
        "Criar no <code>dispose()</code> e descartar no <code>initState()</code>."
      ],
      correta: 0,
      explicacao: "Criar no <code>build()</code> recria o controller a cada rebuild (e perde o texto); não descartar causa vazamento de memória."
    },
    {
      tema: "SnackBar",
      pergunta: "Complete: para exibir um SnackBar de \"Pedido enviado!\", o código correto é...",
      opcoes: [
        "<code>ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text(\"Pedido enviado!\")))</code>",
        "<code>SnackBar.show(context, \"Pedido enviado!\")</code>",
        "<code>Navigator.push(context, SnackBar(...))</code>",
        "<code>setState(() =&gt; SnackBar(\"Pedido enviado!\"))</code>"
      ],
      correta: 0,
      explicacao: "SnackBar se exibe via <code>ScaffoldMessenger.of(context).showSnackBar(...)</code>."
    },
    {
      tema: "Validação",
      pergunta: "Na tela de pedido, o botão \"Enviar\" só deve funcionar se nome e produto estiverem preenchidos. Qual implementação simples resolve?",
      opcoes: [
        "No <code>onPressed</code>, checar <code>if (nomeController.text.isEmpty || produtoController.text.isEmpty)</code> e, se vazio, exibir um SnackBar de erro em vez de enviar.",
        "Deixar enviar sempre e validar depois.",
        "Usar <code>try/catch</code> ao redor do botão.",
        "Desabilitar o teclado do usuário."
      ],
      correta: 0,
      explicacao: "Checar <code>.text.isEmpty</code> dos controllers e dar feedback com SnackBar é a validação básica da atividade."
    },
    {
      tema: "AnimatedContainer",
      pergunta: "Para o card do produto crescer suavemente ao ser tocado usando <code>AnimatedContainer</code>, o que é necessário?",
      opcoes: [
        "Definir uma <code>duration</code> e mudar a propriedade (ex.: <code>width</code>) dentro de um <code>setState</code> — o widget anima a transição sozinho.",
        "Apenas trocar o <code>Container</code> por <code>AnimatedContainer</code>, sem mais nada.",
        "Criar um <code>AnimationController</code> manualmente, obrigatório em qualquer animação.",
        "Usar <code>Navigator.push</code> para recarregar a tela."
      ],
      correta: 0,
      explicacao: "<code>AnimatedContainer</code> é animação implícita: mudou a propriedade via <code>setState</code> + tem <code>duration</code>, ele interpola sozinho."
    },
    {
      tema: "Layout · rolagem",
      pergunta: "Sua <code>Column</code> com os produtos ficou maior que a tela e apareceu a faixa amarela e preta de <b>overflow</b>. Qual a solução mais direta?",
      opcoes: [
        "Envolver a <code>Column</code> em um <code>SingleChildScrollView</code> (ou trocar por <code>ListView</code>) para permitir rolagem.",
        "Diminuir a fonte de todos os textos até caber.",
        "Usar dois <code>Scaffold</code>s empilhados.",
        "Remover o <code>SafeArea</code>."
      ],
      correta: 0,
      explicacao: "Overflow em <code>Column</code> se resolve dando rolagem ao conteúdo: <code>SingleChildScrollView</code> ou <code>ListView</code>."
    },
    {
      tema: "Widgets personalizados",
      pergunta: "Na atividade, criamos o <code>CardProduto</code> como widget separado em vez de repetir o mesmo código 4 vezes. Qual a principal vantagem?",
      opcoes: [
        "Reutilização e organização: um único widget parametrizado (nome, preço, imagem) exibe qualquer produto, e mudanças de layout são feitas em um só lugar.",
        "Widgets separados rodam em outra thread, dobrando a performance.",
        "É obrigatório: o Flutter não permite repetir widgets.",
        "Só serve pra deixar o código maior."
      ],
      correta: 0,
      explicacao: "Componentizar evita duplicação: os dados variam via parâmetros e a manutenção fica centralizada."
    }
  ];

  /* =========================== MODO DIFÍCIL =========================== */
  const dificil = [
    {
      tema: "Scaffold",

  const modos = {
    facil:   { nome: "Fácil",   questoes: facil },
    medio:   { nome: "Médio",   questoes: medio },
    dificil: { nome: "Difícil", questoes: dificil }
  };

  const temasChips = ["Scaffold", "setState", "Navigator", "Controllers", "Validação", "SnackBar", "BottomSheet", "AnimatedContainer", "ListView", "Arquitetura"];

  let modoAtual = null;
  let questoes = [];
  let atual = 0;
  let acertos = 0;
  let ordemAtual = [];
  let respondida = false;
  let erros = [];
  let iniciado = false;

  const card = document.getElementById("card");
  const barra = document.getElementById("barra");
  const contador = document.getElementById("contador");
  const placar = document.getElementById("placar");

  function embaralhar(n) {
    const arr = [...Array(n).keys()];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function telaInicial() {
    iniciado = false;
    modoAtual = null;
    barra.style.width = "0%";
    contador.textContent = "";
    placar.textContent = "";
    card.innerHTML = `
      <div class="hero">
        <h1>&gt; Quiz Flutter<br><span>Lanchonete Express 🍔</span></h1>
        <p class="desc">Escolha o modo. Feedback e explicação na hora, questões erradas listadas no final. As alternativas embaralham a cada tentativa.</p>
        <div class="chips">${temasChips.map(t => `<span class="chip">${t}</span>`).join("")}</div>
        <div class="modos">
          <button class="modo facil" onclick="iniciar('facil')">
            <span class="m-icone">🟢</span>
            <span class="m-nome">Fácil</span>
            <span class="m-desc">10 questões · conceitos e definições básicas</span>
          </button>
          <button class="modo medio" onclick="iniciar('medio')">
            <span class="m-icone">🟠</span>
            <span class="m-nome">Médio</span>
            <span class="m-desc">10 questões · aplicação prática no código</span>
          </button>
          <button class="modo dificil" onclick="iniciar('dificil')">
            <span class="m-icone">🔴</span>
            <span class="m-nome">Difícil</span>
            <span class="m-desc">20 questões · ciclo de vida, performance e pegadinhas</span>
          </button>
        </div>
        <p class="dica-teclado">atalhos: 1/2/3 escolhe o modo · 1–4 responde · Enter avança</p>
      </div>
    `;
  }

  function iniciar(modo) {
    modoAtual = modo;
    questoes = modos[modo].questoes;
    iniciado = true;
    atual = 0;
    acertos = 0;
    erros = [];
    mostrarQuestao();
  }

  function mostrarQuestao() {
    const q = questoes[atual];
    respondida = false;
    ordemAtual = embaralhar(q.opcoes.length);
    barra.style.width = `${(atual / questoes.length) * 100}%`;
    contador.textContent = `[${modos[modoAtual].nome.toLowerCase()}] questão ${String(atual + 1).padStart(2, "0")} / ${questoes.length}`;
    placar.textContent = `${acertos} acerto${acertos === 1 ? "" : "s"}`;
    card.innerHTML = `
      <span class="tema">◆ ${q.tema}</span>
      <div class="pergunta">${q.pergunta}</div>
      ${ordemAtual.map((idxOriginal, pos) => `
        <button class="opcao" data-pos="${pos}" onclick="responder(${idxOriginal})">
          <span class="letra">${String.fromCharCode(65 + pos)}</span>
          <span>${q.opcoes[idxOriginal]}</span>
        </button>`).join("")}
      <div class="explicacao" id="explicacao"></div>
      <button class="botao" id="proxima" onclick="proxima()">Próxima →</button>
    `;
  }

  function responder(idxOriginal) {
    if (respondida) return;
    respondida = true;
    const q = questoes[atual];
    const botoes = card.querySelectorAll(".opcao");
    botoes.forEach(b => b.disabled = true);

    const posCorreta = ordemAtual.indexOf(q.correta);
    const posClicada = ordemAtual.indexOf(idxOriginal);
    const acertou = idxOriginal === q.correta;

    botoes[posCorreta].classList.add("correta");
    botoes.forEach((b, i) => {
      if (i !== posCorreta && i !== posClicada) b.classList.add("apagada");
    });

    const exp = document.getElementById("explicacao");
    if (acertou) {
      acertos++;
      exp.innerHTML = `<span class="tag">✓ ACERTOU</span>${q.explicacao}`;
    } else {
      botoes[posClicada].classList.add("errada");
      exp.classList.add("err");
      exp.innerHTML = `<span class="tag">✗ ERROU</span>${q.explicacao}`;
      erros.push(q);
    }
    exp.style.display = "block";

    const btn = document.getElementById("proxima");
    if (atual === questoes.length - 1) btn.textContent = "Ver resultado →";
    btn.classList.add("mostrar");
    placar.textContent = `${acertos} acerto${acertos === 1 ? "" : "s"}`;
  }

  function proxima() {
    atual++;
    if (atual < questoes.length) mostrarQuestao();
    else mostrarResultado();
  }

  function mostrarResultado() {
    barra.style.width = "100%";
    contador.textContent = `[${modos[modoAtual].nome.toLowerCase()}] resultado`;
    placar.textContent = "";
    const pct = Math.round((acertos / questoes.length) * 100);
    let veredito, sub;
    if (pct >= 90)      { veredito = "Monstro. 🏆";                sub = modoAtual === "dificil" ? "Pode fazer a prova de olhos fechados." : "Bora subir de nível — tenta o próximo modo."; }
    else if (pct >= 70) { veredito = "Tá pronto pra prova. 🍔";    sub = "Só dá uma olhada nos erros abaixo."; }
    else if (pct >= 50) { veredito = "Na média, mas dá pra mais."; sub = "Revisa os tópicos das questões erradas."; }
    else                { veredito = "Volta pra teoria. 📚";       sub = "Refaz o quiz depois de revisar — as alternativas embaralham."; }

    card.innerHTML = `
      <div class="resultado">
        <div class="anel" style="--pct: ${pct}">
          <span class="num">${acertos}/${questoes.length}</span>
          <span class="sub">${pct}%</span>
        </div>
        <p class="veredito">${veredito}</p>
        <p class="veredito-sub">${sub}</p>
        <button class="botao mostrar" onclick="iniciar(modoAtual)">Refazer ↻</button>
        <button class="botao secundario mostrar" onclick="telaInicial()">Trocar modo</button>
      </div>
      ${erros.length ? `
        <div class="revisao">
          <h3>Pra revisar (${erros.length})</h3>
          ${erros.map(q => `
            <div class="rev-item">
              <div class="q">◆ [${q.tema}] ${q.pergunta.split("<pre>")[0]}</div>
              <div class="r"><b>Resposta:</b> ${q.opcoes[q.correta]}</div>
            </div>`).join("")}
        </div>` : ""}
    `;
  }

  document.addEventListener("keydown", (e) => {
    if (!iniciado) {
      if (e.key === "1") iniciar("facil");
      else if (e.key === "2") iniciar("medio");
      else if (e.key === "3") iniciar("dificil");
      return;
    }
    if (!respondida && ["1","2","3","4"].includes(e.key)) {
      const pos = parseInt(e.key) - 1;
      if (pos < ordemAtual.length) responder(ordemAtual[pos]);
    } else if (respondida && e.key === "Enter") {
      proxima();
    }
  });

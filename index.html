<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Flutter — Lanchonete Express</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --card: #131316;
    --card2: #1a1a1f;
    --border: #26262c;
    --texto: #e4e4e7;
    --dim: #8b8b93;
    --verde: #22c55e;
    --verde-soft: rgba(34, 197, 94, 0.12);
    --vermelho: #ef4444;
    --vermelho-soft: rgba(239, 68, 68, 0.12);
    --azul: #60a5fa;
    --amarelo: #fbbf24;
    --laranja: #fb923c;
    --roxo: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 50% -20%, rgba(34,197,94,0.07), transparent 60%);
    color: var(--texto);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .app { width: 100%; max-width: 760px; }

  /* ---------- barra de navegação ---------- */
  .navbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    min-height: 36px;
  }
  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 8px 13px;
    border-radius: 8px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
  }
  .nav-btn:hover:not(:disabled) { color: var(--texto); border-color: var(--dim); transform: translateY(-1px); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn.home:hover:not(:disabled) { color: var(--verde); border-color: var(--verde); }
  .nav-spacer { flex: 1; }
  .nav-modo {
    font-size: 0.7rem;
    color: var(--dim);
    background: var(--card2);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 99px;
  }
  .nav-modo b { color: var(--texto); }

  .barra-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .barra {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--verde), #86efac);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .topo .placar { color: var(--verde); font-weight: 600; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    animation: entrar 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes entrar {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero h1 { font-size: 1.5rem; font-weight: 800; line-height: 1.3; }
  .hero h1 span { color: var(--verde); }
  .hero .desc { color: var(--dim); font-size: 0.85rem; margin: 14px 0 20px; line-height: 1.6; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
  .chip {
    font-size: 0.7rem;
    color: var(--dim);
    background: var(--card2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 99px;
  }

  .modos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 8px; }
  @media (max-width: 560px) { .modos { grid-template-columns: 1fr; } }
  .modo {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    cursor: pointer;
    font-family: inherit;
    color: var(--texto);
    text-align: left;
    transition: border-color 0.15s, transform 0.1s;
  }
  .modo:hover { transform: translateY(-2px); }
  .modo .m-icone { font-size: 1.2rem; display: block; margin-bottom: 8px; }
  .modo .m-nome { font-weight: 800; font-size: 0.88rem; display: block; margin-bottom: 4px; }
  .modo .m-desc { font-size: 0.67rem; color: var(--dim); line-height: 1.5; display: block; }
  .modo.facil:hover     { border-color: var(--verde); }
  .modo.facil .m-nome   { color: var(--verde); }
  .modo.medio:hover     { border-color: var(--laranja); }
  .modo.medio .m-nome   { color: var(--laranja); }
  .modo.dificil:hover   { border-color: var(--vermelho); }
  .modo.dificil .m-nome { color: var(--vermelho); }
  .modo.codigo:hover    { border-color: var(--azul); }
  .modo.codigo .m-nome  { color: var(--azul); }
  .modo.resumo:hover    { border-color: var(--roxo); }
  .modo.resumo .m-nome  { color: var(--roxo); }

  .tema {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--verde);
    background: var(--verde-soft);
    border: 1px solid rgba(34,197,94,0.3);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 16px;
  }
  .pergunta { font-size: 0.95rem; line-height: 1.65; margin-bottom: 22px; }
  .pergunta b { color: var(--amarelo); }
  code {
    background: #202027;
    padding: 2px 6px;
    border-radius: 5px;
    color: var(--azul);
    font-size: 0.85em;
    font-family: inherit;
  }
  pre {
    background: #0c0c0f;
    border: 1px solid var(--border);
    border-left: 3px solid var(--azul);
    border-radius: 8px;
    padding: 16px;
    margin: 14px 0 20px;
    overflow-x: auto;
    font-size: 0.8rem;
    line-height: 1.65;
    color: #d4d4d8;
  }
  pre .kw { color: #c084fc; }
  pre .fn { color: #60a5fa; }
  pre .str { color: #86efac; }
  pre .cm { color: #6b7280; font-style: italic; }
  pre .num { color: #fbbf24; }

  .opcao {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--texto);
    font-family: inherit;
    font-size: 0.83rem;
    line-height: 1.55;
    padding: 13px 15px;
    border-radius: 10px;
    margin-bottom: 9px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, background 0.15s;
  }
  .opcao .txt { display: block; min-height: 3.1em; }
  .opcao:hover:not(:disabled) { border-color: var(--verde); transform: translateX(3px); }
  .opcao:disabled { cursor: default; }
  .letra {
    flex-shrink: 0;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 800;
    color: var(--dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .opcao:hover:not(:disabled) .letra { color: var(--verde); border-color: var(--verde); }
  .opcao.correta { border-color: var(--verde); background: var(--verde-soft); }
  .opcao.correta .letra { background: var(--verde); border-color: var(--verde); color: #052e16; }
  .opcao.errada { border-color: var(--vermelho); background: var(--vermelho-soft); }
  .opcao.errada .letra { background: var(--vermelho); border-color: var(--vermelho); color: #450a0a; }
  .opcao.apagada { opacity: 0.45; }

  .explicacao {
    display: none;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--verde);
    border-radius: 8px;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--dim);
    animation: entrar 0.3s ease;
  }
  .explicacao .tag { color: var(--verde); font-weight: 800; margin-right: 6px; }
  .explicacao.err .tag { color: var(--vermelho); }
  .explicacao.err { border-left-color: var(--vermelho); }

  .botao {
    display: none;
    margin-top: 20px;
    background: var(--verde);
    color: #052e16;
    border: none;
    font-family: inherit;
    font-weight: 800;
    font-size: 0.85rem;
    padding: 13px 28px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.15s;
  }
  .botao:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .botao.mostrar { display: inline-block; animation: entrar 0.3s ease; }
  .botao.secundario {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
    margin-left: 8px;
  }
  .botao.secundario:hover { color: var(--texto); border-color: var(--dim); }
  .dica-teclado { font-size: 0.68rem; color: #55555c; margin-top: 14px; }

  .resultado { text-align: center; }
  .anel {
    width: 140px; height: 140px;
    margin: 10px auto 18px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background:
      radial-gradient(closest-side, var(--card) 82%, transparent 83%),
      conic-gradient(var(--verde) calc(var(--pct) * 1%), var(--border) 0);
  }
  .anel .num { font-size: 1.8rem; font-weight: 800; color: var(--verde); }
  .anel .sub { font-size: 0.7rem; color: var(--dim); }
  .veredito { color: var(--texto); font-size: 0.95rem; margin-bottom: 4px; font-weight: 600; }
  .veredito-sub { color: var(--dim); font-size: 0.8rem; margin-bottom: 24px; }

  .revisao { text-align: left; margin-top: 8px; }
  .revisao h3 {
    font-size: 0.8rem; color: var(--vermelho);
    margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .rev-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--vermelho);
    border-radius: 8px;
    padding: 13px 15px; margin-bottom: 9px;
    font-size: 0.78rem; line-height: 1.6;
  }
  .rev-item .q { color: var(--texto); margin-bottom: 6px; }
  .rev-item .r { color: var(--dim); }
  .rev-item .r b { color: var(--verde); font-weight: 600; }

  /* ---------- resumo ---------- */
  .resumo-topo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .resumo-topo h2 { font-size: 1.15rem; font-weight: 800; color: var(--roxo); }
  .resumo-tag {
    font-size: 0.7rem; color: var(--dim);
    background: var(--card2); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 99px;
  }
  .resumo-corpo { font-size: 0.88rem; line-height: 1.75; color: var(--texto); }
  .resumo-corpo p { margin-bottom: 14px; }
  .resumo-corpo b { color: var(--amarelo); }
  .resumo-corpo .destaque {
    display: block;
    background: var(--card2);
    border-left: 3px solid var(--roxo);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 4px 0 16px;
    font-size: 0.82rem;
    color: var(--dim);
  }
  .resumo-lista {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px;
  }
  .resumo-nav {
    font-size: 0.72rem; color: var(--dim);
    background: var(--card2); border: 1px solid var(--border);
    padding: 7px 12px; border-radius: 8px; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .resumo-nav:hover { color: var(--texto); border-color: var(--dim); }
  .resumo-nav.ativo { color: var(--roxo); border-color: var(--roxo); }
</style>
</head>
<body>
<div class="app">
  <div class="navbar" id="navbar"></div>
  <div class="barra-wrap"><div class="barra" id="barra"></div></div>
  <div class="topo">
    <span id="contador"></span>
    <span class="placar" id="placar"></span>
  </div>
  <div class="card" id="card"></div>
</div>

<script>
  /* =========================== MODO FÁCIL =========================== */
  const facil = [
    {
      tema: "Scaffold",
      pergunta: "O que é o <code>Scaffold</code> no Flutter?",
      opcoes: [
        "É o widget que fornece a estrutura visual básica de uma tela Material Design, com espaços reservados para a AppBar, o body, o FloatingActionButton e o Drawer.",
        "É o motor interno do framework responsável por compilar o código Dart para código nativo de cada plataforma no momento em que o aplicativo é executado pelo usuário.",
        "É o banco de dados local que o Flutter usa por padrão para salvar as informações do aplicativo, como os pedidos, mantendo tudo mesmo depois que o app é fechado.",
        "É um pacote externo de layout mantido pela comunidade que precisa ser instalado com <code>flutter pub add scaffold</code> antes de poder ser usado no projeto."
      ],
      correta: 0,
      explicacao: "O <code>Scaffold</code> é o \"esqueleto\" da tela: AppBar em cima, body no meio, FAB, Drawer etc. Já vem no Flutter — não é pacote externo, não compila nada e não guarda dados."
    },
    {
      tema: "Scaffold",
      pergunta: "Qual propriedade do <code>Scaffold</code> define o conteúdo principal da tela?",
      opcoes: [
        "A propriedade <code>appBar</code>, já que tudo o que aparece na tela é considerado parte da barra superior e é desenhado a partir dela, de cima para baixo.",
        "A propriedade <code>body</code>, que recebe o widget principal exibido na área central da tela, entre a AppBar (se houver) e a parte inferior do Scaffold.",
        "A propriedade <code>home</code>, que define o widget inicial exibido em qualquer estrutura do Flutter, funcionando tanto no MaterialApp quanto dentro do Scaffold.",
        "A propriedade <code>child</code>, padrão presente em todos os widgets do Flutter para definir o conteúdo interno que será renderizado dentro do componente."
      ],
      correta: 1,
      explicacao: "O conteúdo principal vai no <code>body</code>. <code>appBar</code> é só a barra do topo, <code>home</code> pertence ao <code>MaterialApp</code> e o <code>Scaffold</code> nem tem propriedade <code>child</code>."
    },
    {
      tema: "Stateless × Stateful",
      pergunta: "Você precisa de uma tela com um contador que muda quando o usuário aperta um botão. Qual tipo de widget usar?",
      opcoes: [
        "<code>StatelessWidget</code>, porque telas com apenas um botão e um texto são consideradas simples demais para justificar qualquer mecanismo de gerenciamento de estado.",
        "<code>StatefulWidget</code>, porque o valor do contador muda durante a execução e a tela precisa ser redesenhada para refletir cada novo valor exibido ao usuário.",
        "<code>Scaffold</code>, que já vem com um mecanismo interno de controle de estado embutido e atualiza automaticamente qualquer contador declarado dentro dele.",
        "<code>MaterialApp</code>, que centraliza e gerencia o estado de todos os widgets filhos, dispensando o uso de qualquer outro tipo de widget para essa finalidade."
      ],
      correta: 1,
      explicacao: "Se algo na tela muda com o tempo ou com interação, é <code>StatefulWidget</code>. <code>Scaffold</code> e <code>MaterialApp</code> são estruturais — não gerenciam o estado do seu contador."
    },
    {
      tema: "setState",
      pergunta: "De forma simples, o que o <code>setState()</code> faz?",
      opcoes: [
        "Ele grava o novo valor da variável de forma permanente na memória do celular, garantindo que o dado continue existindo mesmo depois que o app for fechado.",
        "Ele avisa o Flutter que uma variável de estado mudou, fazendo o <code>build()</code> ser executado de novo e a tela ser redesenhada com os valores atualizados.",
        "Ele cria uma nova tela já com os valores atualizados e navega automaticamente até ela, substituindo a tela antiga que exibia os valores desatualizados.",
        "Ele reinicia o widget do zero, apagando todas as variáveis da classe e devolvendo a tela ao estado inicial definido no momento da sua criação."
      ],
      correta: 1,
      explicacao: "<code>setState</code> = \"ei Flutter, mudei algo, redesenha a tela\". Não salva nada em disco, não navega e não apaga variáveis."
    },
    {
      tema: "Navigator",
      pergunta: "Qual comando abre uma nova tela no Flutter?",
      opcoes: [
        "<code>Navigator.push(context, MaterialPageRoute(builder: (context) =&gt; NovaTela()))</code>, que empilha a nova tela por cima da atual na pilha de navegação.",
        "<code>Scaffold.open(context, NovaTela())</code>, método do próprio Scaffold que fecha a estrutura visual da tela atual e abre uma nova estrutura no lugar dela.",
        "<code>setState(() =&gt; NovaTela())</code>, já que a mudança de tela é uma mudança de estado e por isso deve passar pelo mecanismo padrão de rebuild do framework.",
        "<code>MaterialApp.route(context, NovaTela())</code>, que registra a nova tela na tabela de rotas do aplicativo e em seguida a exibe imediatamente ao usuário."
      ],
      correta: 0,
      explicacao: "<code>Navigator.push</code> com <code>MaterialPageRoute</code> é a forma padrão de empilhar uma nova tela. Os outros métodos simplesmente não existem no framework."
    },
    {
      tema: "Navigator",
      pergunta: "E para voltar para a tela anterior?",
      opcoes: [
        "<code>Navigator.pop(context)</code>, que remove a tela atual do topo da pilha de navegação e devolve o usuário para a tela imediatamente anterior que estava aberta.",
        "<code>Navigator.back(context)</code>, método equivalente ao botão físico de voltar do Android e ao gesto de deslizar da borda esquerda para a direita no iOS.",
        "<code>Navigator.return(context)</code>, que encerra a rota atual e devolve o controle da navegação diretamente para a primeira tela que foi aberta no aplicativo.",
        "<code>Navigator.exit(context)</code>, que fecha a tela atual e, se não existir nenhuma tela anterior na pilha, minimiza o aplicativo deixando-o em segundo plano."
      ],
      correta: 0,
      explicacao: "<code>pop</code> remove a tela atual da pilha e volta para a anterior. <code>back</code>, <code>return</code> e <code>exit</code> não existem no <code>Navigator</code>."
    },
    {
      tema: "TextEditingController",
      pergunta: "Para que serve o <code>TextEditingController</code>?",
      opcoes: [
        "Ele serve para ler e controlar o texto digitado em um <code>TextField</code> — por exemplo, recuperar o nome do cliente com <code>meuController.text</code> ao enviar o pedido.",
        "Ele valida automaticamente o formato de e-mails, senhas e telefones digitados nos formulários do app, dispensando qualquer verificação manual escrita no código.",
        "Ele cria animações de digitação letra por letra na tela, controlando a velocidade com que cada caractere do texto aparece gradualmente para o usuário.",
        "Ele formata o estilo visual dos textos exibidos no aplicativo, controlando propriedades como cor, fonte, tamanho e espaçamento de cada campo da interface."
      ],
      correta: 0,
      explicacao: "É a ponte entre o campo e o código: <code>meuController.text</code> retorna o que foi digitado. Validação é papel do <code>validator</code>; estilo é papel do <code>TextStyle</code>."
    },
    {
      tema: "SnackBar",
      pergunta: "O que é um <code>SnackBar</code>?",
      opcoes: [
        "É uma mensagem temporária que aparece na parte de baixo da tela (por exemplo, \"Pedido enviado!\") e desaparece sozinha depois de alguns segundos.",
        "É um menu lateral que desliza a partir da borda esquerda da tela quando o usuário toca no ícone de três linhas localizado na AppBar do aplicativo.",
        "É uma barra fixa de navegação exibida no rodapé do app, usada para alternar entre as seções principais, como o cardápio, a lista de pedidos e o perfil.",
        "É um alerta em formato de janela que aparece no centro da tela e bloqueia toda a interação do usuário até que ele toque em um dos botões de confirmação."
      ],
      correta: 0,
      explicacao: "SnackBar é o aviso rápido da base da tela. Menu lateral é o <code>Drawer</code>, barra fixa no rodapé é o <code>BottomNavigationBar</code> e alerta bloqueante é o <code>AlertDialog</code>."
    },
    {
      tema: "ListView",
      pergunta: "Qual widget é o mais indicado para exibir uma lista rolável de produtos do cardápio?",
      opcoes: [
        "O <code>ListView</code>, widget feito para exibir itens em sequência vertical, com rolagem automática sempre que o conteúdo ultrapassa a altura da tela.",
        "O <code>Row</code>, que organiza os produtos lado a lado na horizontal e adiciona rolagem automática sempre que os itens não couberem na largura do aparelho.",
        "O <code>Stack</code>, que empilha os produtos um sobre o outro em camadas e permite ao usuário deslizar entre eles com o dedo, como um baralho de cartas.",
        "A <code>AppBar</code>, que exibe os itens do cardápio na barra superior da tela e os mantém sempre visíveis, independentemente da rolagem do conteúdo."
      ],
      correta: 0,
      explicacao: "<code>ListView</code> já vem com rolagem vertical automática — é o widget clássico de listas. <code>Row</code> não rola sozinho, <code>Stack</code> sobrepõe e <code>AppBar</code> é só a barra do topo."
    },
    {
      tema: "BottomSheet",
      pergunta: "O que o <code>showModalBottomSheet</code> faz?",
      opcoes: [
        "Ele abre um painel que desliza de baixo para cima sobre a tela atual (ex.: detalhes do pedido), bloqueando o conteúdo que fica atrás até ser fechado.",
        "Ele fixa uma barra de menu permanente no rodapé do aplicativo, que permanece visível em todas as telas abertas até ser explicitamente removida pelo código.",
        "Ele abre uma nova tela em modo cheio por cima da tela atual, funcionando de forma equivalente a um <code>Navigator.push</code> porém com animação de baixo para cima.",

<span class="destaque">Scaffold(<br>&nbsp;&nbsp;appBar: AppBar(title: Text("Lanchonete")),<br>&nbsp;&nbsp;body: Center(child: Text("Cardápio")),<br>)</span>
<p>O conteúdo que você quer mostrar vai <b>sempre no body</b>. A <b>AppBar</b> costuma ter <code>title</code>, e pode ter <code>actions</code> (botões à direita) e <code>leading</code> (ícone à esquerda).</p>`
    },
    {
      titulo: "StatelessWidget × StatefulWidget",
      tag: "tipos de widget",
      corpo: `<p>Se a tela <b>nunca muda sozinha</b> depois de construída (só exibe dados), use <b>StatelessWidget</b>. Se algo muda durante o uso — um contador, um switch, um campo — use <b>StatefulWidget</b>.</p>
<p>O <b>StatefulWidget</b> vem em duas classes: a do widget (imutável) e a <code>State</code> (onde ficam as variáveis que mudam e o <code>build()</code>).</p>
<span class="destaque">class Contador extends StatefulWidget { ... }<br>class _ContadorState extends State&lt;Contador&gt; {<br>&nbsp;&nbsp;int total = 0; // o estado mora aqui<br>}</span>
<p><b>Regra prática:</b> as variáveis que mudam ficam na classe <code>State</code>, nunca dentro do <code>build()</code> (senão zeram a cada redesenho).</p>`
    },
    {
      titulo: "setState",
      tag: "atualizar a tela",
      corpo: `<p><b>setState</b> é como você avisa o Flutter: "mudei uma variável, redesenha a tela". Sem ele, o valor até muda na memória, mas a tela continua mostrando o valor antigo.</p>
<span class="destaque">void _somar() {<br>&nbsp;&nbsp;setState(() {<br>&nbsp;&nbsp;&nbsp;&nbsp;total++;<br>&nbsp;&nbsp;});<br>}</span>
<p>Ele <b>não salva nada em disco</b> e <b>não muda a variável sozinho</b> — quem faz isso é o seu código dentro do callback. Ele só agenda a reconstrução do <code>build()</code>.</p>
<p><b>Cuidado:</b> nunca chame <code>setState</code> depois que a tela foi fechada (em código <code>async</code>, cheque <code>if (mounted)</code> antes) nem dentro do <code>dispose()</code> — dá erro.</p>`
    },
    {
      titulo: "Navigator (navegação)",
      tag: "trocar de tela",
      corpo: `<p>As telas ficam numa <b>pilha</b>. <code>push</code> coloca uma tela nova por cima; <code>pop</code> tira a de cima e volta pra anterior.</p>
<span class="destaque">// abrir<br>Navigator.push(context, MaterialPageRoute(<br>&nbsp;&nbsp;builder: (context) => Detalhes(nome: "X-Burger"),<br>));<br><br>// voltar<br>Navigator.pop(context);</span>
<p><b>Passar dado adiante:</b> pelo construtor da tela (<code>Detalhes(nome: ...)</code>). <b>Receber dado de volta:</b> <code>final r = await Navigator.push(...)</code>, e a outra tela fecha com <code>Navigator.pop(context, valor)</code>.</p>
<p><code>pushReplacement</code> troca a tela sem deixar voltar (típico de login → home).</p>`
    },
    {
      titulo: "TextEditingController",
      tag: "campos de texto",
      corpo: `<p>Pra ler o que o usuário digita num <code>TextField</code>, você usa um <b>controller</b>. Você o cria na classe <code>State</code>, liga no campo, e lê com <code>.text</code>.</p>
<span class="destaque">final nomeController = TextEditingController();<br><br>TextField(controller: nomeController),<br><br>// ler:<br>print(nomeController.text);</span>
<p><b>Sempre descarte no dispose()</b> pra não vazar memória:</p>
<span class="destaque">@override<br>void dispose() {<br>&nbsp;&nbsp;nomeController.dispose();<br>&nbsp;&nbsp;super.dispose();<br>}</span>`
    },
    {
      titulo: "Validação de formulário",
      tag: "checar campos",
      corpo: `<p>Forma <b>simples</b>: no <code>onPressed</code>, cheque se os campos estão vazios e mostre um aviso, saindo com <code>return</code> antes de enviar.</p>
<span class="destaque">if (nomeController.text.isEmpty) {<br>&nbsp;&nbsp;// mostrar SnackBar de erro<br>&nbsp;&nbsp;return;<br>}<br>_enviarPedido();</span>
<p>Forma <b>robusta</b>: use <code>Form</code> com <code>GlobalKey&lt;FormState&gt;</code> e <code>TextFormField</code> com <code>validator</code>. Chamando <code>formKey.currentState!.validate()</code>, cada campo mostra seu próprio erro na tela.</p>`
    },
    {
      titulo: "SnackBar",
      tag: "avisos rápidos",
      corpo: `<p>É a mensagem que sobe na base da tela e some sozinha. A forma correta e atual usa o <b>ScaffoldMessenger</b>:</p>
<span class="destaque">ScaffoldMessenger.of(context).showSnackBar(<br>&nbsp;&nbsp;SnackBar(content: Text("Pedido enviado!")),<br>);</span>
<p>Evite o antigo <code>Scaffold.of(context)</code> — ele dá o erro "não contém um Scaffold". Se disparar vários, eles entram numa <b>fila</b>; pra pular, use <code>hideCurrentSnackBar()</code> antes.</p>`
    },
    {
      titulo: "showModalBottomSheet",
      tag: "painel deslizante",
      corpo: `<p>Abre um painel que sobe de baixo, bloqueando o conteúdo atrás até fechar. Muito usado pra detalhes, filtros e confirmações.</p>
<span class="destaque">showModalBottomSheet(<br>&nbsp;&nbsp;context: context,<br>&nbsp;&nbsp;builder: (context) => Container(<br>&nbsp;&nbsp;&nbsp;&nbsp;child: Text("Detalhes do pedido"),<br>&nbsp;&nbsp;),<br>);</span>
<p>Ele retorna um <code>Future</code> — dá pra capturar um valor com <code>await</code> se você fechar o painel com <code>Navigator.pop(context, valor)</code> lá dentro.</p>`
    },
    {
      titulo: "AnimatedContainer",
      tag: "animação fácil",
      corpo: `<p>É um <code>Container</code> que <b>anima sozinho</b> quando você muda uma propriedade dele (tamanho, cor, borda, padding). Basta ter uma <code>duration</code> e mudar o valor via <code>setState</code>.</p>
<span class="destaque">AnimatedContainer(<br>&nbsp;&nbsp;duration: Duration(milliseconds: 300),<br>&nbsp;&nbsp;width: expandido ? 200 : 100,<br>&nbsp;&nbsp;color: Colors.orange,<br>)</span>
<p>É chamado de <b>animação implícita</b>: você não mexe em controller nenhum, o Flutter interpola do valor antigo pro novo dentro do tempo da <code>duration</code>.</p>`
    },
    {
      titulo: "Column, ListView & rolagem",
      tag: "organizar na tela",
      corpo: `<p><b>Column</b> empilha widgets na vertical. Se o conteúdo passa da tela, aparece a faixa amarela e preta de <b>overflow</b> — resolva com <code>SingleChildScrollView</code> ou <code>ListView</code>.</p>
<p><b>ListView</b> já rola sozinho. Pra listas grandes, o <code>ListView.builder</code> é o ideal: constrói os itens <b>sob demanda</b> (lazy), só o que está visível.</p>
<span class="destaque">ListView.builder(<br>&nbsp;&nbsp;itemCount: produtos.length,<br>&nbsp;&nbsp;itemBuilder: (context, i) => ListTile(<br>&nbsp;&nbsp;&nbsp;&nbsp;title: Text(produtos[i]),<br>&nbsp;&nbsp;),<br>)</span>`
    },
    {
      titulo: "Widgets personalizados",
      tag: "organizar o código",
      corpo: `<p>Em vez de repetir o mesmo bloco de código 4 vezes (um por produto), crie um widget reutilizável e passe os dados por parâmetro.</p>
<span class="destaque">class CardProduto extends StatelessWidget {<br>&nbsp;&nbsp;final String nome;<br>&nbsp;&nbsp;final double preco;<br>&nbsp;&nbsp;const CardProduto({super.key, required this.nome, required this.preco});<br>&nbsp;&nbsp;// ...<br>}</span>
<p><b>Vantagens:</b> menos repetição, manutenção num lugar só, e usar <code>const</code> no construtor ajuda a performance (o Flutter reaproveita a instância entre rebuilds). Separar em widgets menores também <b>isola os rebuilds</b> do <code>setState</code>.</p>`
    }
  ];

  const modos = {
    facil:   { nome: "Fácil",   tipo: "quiz",   questoes: facil },
    medio:   { nome: "Médio",   tipo: "quiz",   questoes: medio },
    dificil: { nome: "Difícil", tipo: "quiz",   questoes: dificil },
    codigo:  { nome: "Código",  tipo: "quiz",   questoes: codigo },
    resumo:  { nome: "Resumo",  tipo: "resumo", questoes: resumo }
  };

  const temasChips = ["Scaffold", "setState", "Navigator", "Controllers", "Validação", "SnackBar", "BottomSheet", "AnimatedContainer", "ListView"];

  let modoAtual = null;
  let questoes = [];
  let atual = 0;
  let acertos = 0;
  let ordemAtual = [];
  let respondida = false;
  let erros = [];
  let iniciado = false;
  let respostasDadas = []; // guarda qual índice foi clicado em cada questão

  const navbar = document.getElementById("navbar");
  const card = document.getElementById("card");
  const barra = document.getElementById("barra");
  const contador = document.getElementById("contador");
  const placar = document.getElementById("placar");

  function embaralhar(n) {
    const arr = [...Array(n).keys()];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /* ---------- navbar ---------- */
  function renderNavbar() {
    if (!iniciado) { navbar.innerHTML = ""; return; }
    const ehResumo = modos[modoAtual].tipo === "resumo";
    const podeVoltar = atual > 0;
    navbar.innerHTML = `
      <button class="nav-btn home" onclick="telaInicial()">⌂ Início</button>
      <button class="nav-btn" onclick="voltarQuestao()" ${podeVoltar ? "" : "disabled"}>← ${ehResumo ? "Anterior" : "Questão anterior"}</button>
      <span class="nav-spacer"></span>
      <span class="nav-modo">modo: <b>${modos[modoAtual].nome}</b></span>
    `;
  }

  function telaInicial() {
    iniciado = false;
    modoAtual = null;
    renderNavbar();
    barra.style.width = "0%";
    contador.textContent = "";
    placar.textContent = "";
    card.innerHTML = `
      <div class="hero">
        <h1>&gt; Quiz Flutter<br><span>Lanchonete Express 🍔</span></h1>
        <p class="desc">Escolha o modo. Nos quizzes, as alternativas embaralham a cada tentativa e você vê a explicação na hora. O modo Resumo é só material de estudo.</p>
        <div class="chips">${temasChips.map(t => `<span class="chip">${t}</span>`).join("")}</div>
        <div class="modos">
          <button class="modo facil" onclick="iniciar('facil')">
            <span class="m-icone">🟢</span>
            <span class="m-nome">Fácil</span>
            <span class="m-desc">10 questões · conceitos e definições básicas</span>
          </button>
          <button class="modo medio" onclick="iniciar('medio')">
            <span class="m-icone">🟠</span>
            <span class="m-nome">Médio</span>
            <span class="m-desc">10 questões · aplicação prática no código</span>
          </button>
          <button class="modo dificil" onclick="iniciar('dificil')">
            <span class="m-icone">🔴</span>
            <span class="m-nome">Difícil</span>
            <span class="m-desc">20 questões · ciclo de vida, performance e pegadinhas</span>
          </button>
          <button class="modo codigo" onclick="iniciar('codigo')">
            <span class="m-icone">💻</span>
            <span class="m-nome">Código</span>
            <span class="m-desc">11 trechos · leia o código e acerte o que ele faz</span>
          </button>
          <button class="modo resumo" onclick="iniciar('resumo')">
            <span class="m-icone">📖</span>
            <span class="m-nome">Resumo</span>
            <span class="m-desc">11 tópicos · material de estudo, sem quiz</span>
          </button>
        </div>
        <p class="dica-teclado">atalhos nos quizzes: 1–4 responde · Enter avança</p>
      </div>
    `;
  }

  function iniciar(modo) {
    modoAtual = modo;
    questoes = modos[modo].questoes;
    iniciado = true;
    atual = 0;
    acertos = 0;
    erros = [];
    respostasDadas = new Array(questoes.length).fill(null);
    if (modos[modo].tipo === "resumo") mostrarResumo();
    else mostrarQuestao();
  }

  /* ---------- navegar pra trás ---------- */
  function voltarQuestao() {
    if (atual === 0) return;
    atual--;
    if (modos[modoAtual].tipo === "resumo") { mostrarResumo(); return; }
    // ao voltar num quiz, se aquela questão já foi respondida, desconta do placar pra poder responder de novo
    if (respostasDadas[atual] !== null) {
      const q = questoes[atual];
      if (respostasDadas[atual] === q.correta) acertos = Math.max(0, acertos - 1);
      erros = erros.filter(e => e !== q);
      respostasDadas[atual] = null;
    }
    mostrarQuestao();
  }

  /* ---------- quiz ---------- */
  function mostrarQuestao() {
    const q = questoes[atual];
    respondida = false;
    ordemAtual = embaralhar(q.opcoes.length);
    renderNavbar();
    barra.style.width = `${(atual / questoes.length) * 100}%`;
    contador.textContent = `[${modos[modoAtual].nome.toLowerCase()}] questão ${String(atual + 1).padStart(2, "0")} / ${questoes.length}`;
    placar.textContent = `${acertos} acerto${acertos === 1 ? "" : "s"}`;
    const bloco = q.trecho ? `<pre>${q.trecho}</pre>` : "";
    card.innerHTML = `
      <span class="tema">◆ ${q.tema}</span>
      ${bloco}
      <div class="pergunta">${q.pergunta}</div>
      ${ordemAtual.map((idxOriginal, pos) => `
        <button class="opcao" data-pos="${pos}" onclick="responder(${idxOriginal})">
          <span class="letra">${String.fromCharCode(65 + pos)}</span>
          <span class="txt">${q.opcoes[idxOriginal]}</span>
        </button>`).join("")}
      <div class="explicacao" id="explicacao"></div>
      <button class="botao" id="proxima" onclick="proxima()">Próxima →</button>
    `;
  }

  function responder(idxOriginal) {
    if (respondida) return;
    respondida = true;
    const q = questoes[atual];
    respostasDadas[atual] = idxOriginal;
    const botoes = card.querySelectorAll(".opcao");
    botoes.forEach(b => b.disabled = true);

    const posCorreta = ordemAtual.indexOf(q.correta);
    const posClicada = ordemAtual.indexOf(idxOriginal);
    const acertou = idxOriginal === q.correta;

    botoes[posCorreta].classList.add("correta");
    botoes.forEach((b, i) => {
      if (i !== posCorreta && i !== posClicada) b.classList.add("apagada");
    });

    const exp = document.getElementById("explicacao");
    if (acertou) {
      acertos++;
      exp.innerHTML = `<span class="tag">✓ ACERTOU</span>${q.explicacao}`;
    } else {
      botoes[posClicada].classList.add("errada");
      exp.classList.add("err");
      exp.innerHTML = `<span class="tag">✗ ERROU</span>${q.explicacao}`;
      erros.push(q);
    }
    exp.style.display = "block";

    const btn = document.getElementById("proxima");
    if (atual === questoes.length - 1) btn.textContent = "Ver resultado →";
    btn.classList.add("mostrar");
    placar.textContent = `${acertos} acerto${acertos === 1 ? "" : "s"}`;
  }

  function proxima() {
    atual++;
    if (atual < questoes.length) mostrarQuestao();
    else mostrarResultado();
  }

  function mostrarResultado() {
    renderNavbar();
    barra.style.width = "100%";
    contador.textContent = `[${modos[modoAtual].nome.toLowerCase()}] resultado`;
    placar.textContent = "";
    const pct = Math.round((acertos / questoes.length) * 100);
    let veredito, sub;
    if (pct >= 90)      { veredito = "Monstro. 🏆";                sub = modoAtual === "dificil" ? "Pode fazer a prova de olhos fechados." : "Bora subir de nível — tenta o próximo modo."; }
    else if (pct >= 70) { veredito = "Tá pronto pra prova. 🍔";    sub = "Só dá uma olhada nos erros abaixo."; }
    else if (pct >= 50) { veredito = "Na média, mas dá pra mais."; sub = "Revisa os tópicos das questões erradas."; }
    else                { veredito = "Volta pra teoria. 📚";       sub = "Dá uma passada no modo Resumo e refaz."; }

    card.innerHTML = `
      <div class="resultado">
        <div class="anel" style="--pct: ${pct}">
          <span class="num">${acertos}/${questoes.length}</span>
          <span class="sub">${pct}%</span>
        </div>
        <p class="veredito">${veredito}</p>
        <p class="veredito-sub">${sub}</p>
        <button class="botao mostrar" onclick="iniciar(modoAtual)">Refazer ↻</button>
        <button class="botao secundario mostrar" onclick="telaInicial()">Trocar modo</button>
      </div>
      ${erros.length ? `
        <div class="revisao">
          <h3>Pra revisar (${erros.length})</h3>
          ${erros.map(q => `
            <div class="rev-item">
              <div class="q">◆ [${q.tema}] ${q.pergunta.split("<pre>")[0]}</div>
              <div class="r"><b>Resposta:</b> ${q.opcoes[q.correta]}</div>
            </div>`).join("")}
        </div>` : ""}
    `;
  }

  /* ---------- resumo ---------- */
  function mostrarResumo() {
    const r = resumo[atual];
    renderNavbar();
    barra.style.width = `${((atual + 1) / resumo.length) * 100}%`;
    contador.textContent = `[resumo] tópico ${String(atual + 1).padStart(2, "0")} / ${resumo.length}`;
    placar.textContent = "";
    const ehUltimo = atual === resumo.length - 1;
    card.innerHTML = `
      <div class="resumo-topo">
        <h2>${r.titulo}</h2>
        <span class="resumo-tag">${r.tag}</span>
      </div>
      <div class="resumo-corpo">${r.corpo}</div>
      <div class="resumo-lista">
        ${resumo.map((t, i) => `<button class="resumo-nav ${i === atual ? "ativo" : ""}" onclick="irResumo(${i})">${i + 1}. ${t.titulo}</button>`).join("")}
      </div>
      <button class="botao mostrar" onclick="${ehUltimo ? "telaInicial()" : "proximoResumo()"}">${ehUltimo ? "Concluir ✓" : "Próximo tópico →"}</button>
    `;
  }

  function proximoResumo() {
    if (atual < resumo.length - 1) { atual++; mostrarResumo(); }
  }
  function irResumo(i) { atual = i; mostrarResumo(); }

  /* ---------- teclado ---------- */
  document.addEventListener("keydown", (e) => {
    if (!iniciado) {
      const map = { "1": "facil", "2": "medio", "3": "dificil", "4": "codigo", "5": "resumo" };
      if (map[e.key]) iniciar(map[e.key]);
      return;
    }
    const tipo = modos[modoAtual].tipo;
    if (tipo === "resumo") {
      if (e.key === "ArrowRight") proximoResumo();
      else if (e.key === "ArrowLeft") voltarQuestao();
      return;
    }
    if (!respondida && ["1","2","3","4"].includes(e.key)) {
      const pos = parseInt(e.key) - 1;
      if (pos < ordemAtual.length) responder(ordemAtual[pos]);
    } else if (respondida && e.key === "Enter") {
      proxima();
    } else if (e.key === "ArrowLeft") {
      voltarQuestao();
    }
  });

  telaInicial();
</script>
</body>
</html>

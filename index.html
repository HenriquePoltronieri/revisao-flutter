<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Flutter — Lanchonete Express</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --card: #131316;
    --card2: #1a1a1f;
    --border: #26262c;
    --texto: #e4e4e7;
    --dim: #8b8b93;
    --verde: #22c55e;
    --verde-soft: rgba(34, 197, 94, 0.12);
    --vermelho: #ef4444;
    --vermelho-soft: rgba(239, 68, 68, 0.12);
    --azul: #60a5fa;
    --amarelo: #fbbf24;
    --laranja: #fb923c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 50% -20%, rgba(34,197,94,0.07), transparent 60%);
    color: var(--texto);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .app { width: 100%; max-width: 760px; }

  .barra-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .barra {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--verde), #86efac);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .topo .placar { color: var(--verde); font-weight: 600; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    animation: entrar 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes entrar {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero h1 { font-size: 1.5rem; font-weight: 800; line-height: 1.3; }
  .hero h1 span { color: var(--verde); }
  .hero .desc { color: var(--dim); font-size: 0.85rem; margin: 14px 0 20px; line-height: 1.6; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; }
  .chip {
    font-size: 0.7rem;
    color: var(--dim);
    background: var(--card2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 99px;
  }

  .modos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; }
  @media (max-width: 560px) { .modos { grid-template-columns: 1fr; } }
  .modo {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 14px;
    cursor: pointer;
    font-family: inherit;
    color: var(--texto);
    text-align: left;
    transition: border-color 0.15s, transform 0.1s;
  }
  .modo:hover { transform: translateY(-2px); }
  .modo .m-icone { font-size: 1.3rem; display: block; margin-bottom: 8px; }
  .modo .m-nome { font-weight: 800; font-size: 0.9rem; display: block; margin-bottom: 4px; }
  .modo .m-desc { font-size: 0.68rem; color: var(--dim); line-height: 1.5; display: block; }
  .modo.facil:hover   { border-color: var(--verde); }
  .modo.facil .m-nome { color: var(--verde); }
  .modo.medio:hover   { border-color: var(--laranja); }
  .modo.medio .m-nome { color: var(--laranja); }
  .modo.dificil:hover   { border-color: var(--vermelho); }
  .modo.dificil .m-nome { color: var(--vermelho); }

  .tema {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--verde);
    background: var(--verde-soft);
    border: 1px solid rgba(34,197,94,0.3);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 16px;
  }
  .pergunta { font-size: 0.95rem; line-height: 1.65; margin-bottom: 22px; }
  .pergunta b { color: var(--amarelo); }
  code {
    background: #202027;
    padding: 2px 6px;
    border-radius: 5px;
    color: var(--azul);
    font-size: 0.85em;
    font-family: inherit;
  }
  pre {
    background: #0c0c0f;
    border: 1px solid var(--border);
    border-left: 3px solid var(--verde);
    border-radius: 8px;
    padding: 14px;
    margin: 14px 0 4px;
    overflow-x: auto;
    font-size: 0.78rem;
    line-height: 1.6;
    color: #bae6fd;
  }

  .opcao {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--texto);
    font-family: inherit;
    font-size: 0.83rem;
    line-height: 1.55;
    padding: 13px 15px;
    border-radius: 10px;
    margin-bottom: 9px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, background 0.15s;
  }
  .opcao .txt {
    display: block;
    min-height: 3.1em; /* garante a altura de 2 linhas mesmo em telas muito largas */
  }
  .opcao:hover:not(:disabled) {
    border-color: var(--verde);
    transform: translateX(3px);
  }
  .opcao:disabled { cursor: default; }
  .letra {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .opcao:hover:not(:disabled) .letra { color: var(--verde); border-color: var(--verde); }
  .opcao.correta { border-color: var(--verde); background: var(--verde-soft); }
  .opcao.correta .letra { background: var(--verde); border-color: var(--verde); color: #052e16; }
  .opcao.errada { border-color: var(--vermelho); background: var(--vermelho-soft); }
  .opcao.errada .letra { background: var(--vermelho); border-color: var(--vermelho); color: #450a0a; }
  .opcao.apagada { opacity: 0.45; }

  .explicacao {
    display: none;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--verde);
    border-radius: 8px;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--dim);
    animation: entrar 0.3s ease;
  }
  .explicacao .tag { color: var(--verde); font-weight: 800; margin-right: 6px; }
  .explicacao.err .tag { color: var(--vermelho); }
  .explicacao.err { border-left-color: var(--vermelho); }

  .botao {
    display: none;
    margin-top: 20px;
    background: var(--verde);
    color: #052e16;
    border: none;
    font-family: inherit;
    font-weight: 800;
    font-size: 0.85rem;
    padding: 13px 28px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.15s;
  }
  .botao:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .botao.mostrar { display: inline-block; animation: entrar 0.3s ease; }
  .botao.secundario {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
    margin-left: 8px;
  }
  .botao.secundario:hover { color: var(--texto); border-color: var(--dim); }
  .dica-teclado { font-size: 0.68rem; color: #55555c; margin-top: 14px; }

  .resultado { text-align: center; }
  .anel {
    width: 140px; height: 140px;
    margin: 10px auto 18px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(closest-side, var(--card) 82%, transparent 83%),
      conic-gradient(var(--verde) calc(var(--pct) * 1%), var(--border) 0);
  }
  .anel .num { font-size: 1.8rem; font-weight: 800; color: var(--verde); }
  .anel .sub { font-size: 0.7rem; color: var(--dim); }
  .veredito { color: var(--texto); font-size: 0.95rem; margin-bottom: 4px; font-weight: 600; }
  .veredito-sub { color: var(--dim); font-size: 0.8rem; margin-bottom: 24px; }

  .revisao { text-align: left; margin-top: 8px; }
  .revisao h3 {
    font-size: 0.8rem;
    color: var(--vermelho);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .rev-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--vermelho);
    border-radius: 8px;
    padding: 13px 15px;
    margin-bottom: 9px;
    font-size: 0.78rem;
    line-height: 1.6;
  }
  .rev-item .q { color: var(--texto); margin-bottom: 6px; }
  .rev-item .r { color: var(--dim); }
  .rev-item .r b { color: var(--verde); font-weight: 600; }
</style>
</head>
<body>
<div class="app">
  <div class="barra-wrap"><div class="barra" id="barra"></div></div>
  <div class="topo">
    <span id="contador"></span>
    <span class="placar" id="placar"></span>
  </div>
  <div class="card" id="card"></div>
</div>

<script>
  /* =========================== MODO FÁCIL =========================== */
  const facil = [
    {
      tema: "Scaffold",
      pergunta: "O que é o <code>Scaffold</code> no Flutter?",
      opcoes: [
        "É o widget que fornece a estrutura visual básica de uma tela Material Design, com espaços reservados para a AppBar, o body, o FloatingActionButton, o Drawer e a barra de navegação inferior.",
        "É o motor interno do framework responsável por compilar o código Dart para código nativo de cada plataforma (Android e iOS) no momento em que o aplicativo é executado pelo usuário.",
        "É o banco de dados local que o Flutter usa por padrão para salvar as informações do aplicativo, como os pedidos dos clientes, mantendo tudo mesmo depois que o app é fechado.",
        "É um pacote externo de layout mantido pela comunidade que precisa ser instalado com <code>flutter pub add scaffold</code> antes de poder ser utilizado em qualquer projeto novo."
      ],
      correta: 0,
      explicacao: "O <code>Scaffold</code> é o \"esqueleto\" da tela: AppBar em cima, body no meio, FAB, Drawer etc. Já vem no Flutter — não é pacote externo, não compila nada e não guarda dados."
    },
    {
      tema: "Scaffold",
      pergunta: "Qual propriedade do <code>Scaffold</code> define o conteúdo principal da tela?",
      opcoes: [
        "A propriedade <code>appBar</code>, já que tudo o que aparece na tela é considerado parte da barra superior e é desenhado a partir dela, de cima para baixo, pelo framework.",
        "A propriedade <code>body</code>, que recebe o widget principal exibido na área central da tela, ocupando o espaço entre a AppBar (se houver) e a parte inferior do Scaffold.",
        "A propriedade <code>home</code>, que define o widget inicial exibido em qualquer estrutura do Flutter, funcionando tanto no MaterialApp quanto dentro do próprio Scaffold.",
        "A propriedade <code>child</code>, padrão presente em todos os widgets do Flutter para definir o conteúdo interno que será renderizado dentro dos limites do componente."
      ],
      correta: 1,
      explicacao: "O conteúdo principal vai no <code>body</code>. <code>appBar</code> é só a barra do topo, <code>home</code> pertence ao <code>MaterialApp</code> e o <code>Scaffold</code> nem tem propriedade <code>child</code>."
    },
    {
      tema: "Stateless × Stateful",
      pergunta: "Você precisa de uma tela com um contador que muda quando o usuário aperta um botão. Qual tipo de widget usar?",
      opcoes: [
        "<code>StatelessWidget</code>, porque telas com apenas um botão e um texto são consideradas simples demais para justificar o uso de qualquer mecanismo de gerenciamento de estado.",
        "<code>StatefulWidget</code>, porque o valor do contador muda durante a execução do aplicativo e a tela precisa ser redesenhada para refletir cada novo valor exibido ao usuário.",
        "<code>Scaffold</code>, que já vem com um mecanismo interno de controle de estado embutido e atualiza automaticamente qualquer contador que for declarado dentro da sua estrutura.",
        "<code>MaterialApp</code>, que centraliza e gerencia o estado de todos os widgets filhos da aplicação, dispensando o uso de qualquer outro tipo de widget para essa finalidade."
      ],
      correta: 1,
      explicacao: "Se algo na tela muda com o tempo ou com interação, é <code>StatefulWidget</code>. <code>Scaffold</code> e <code>MaterialApp</code> são estruturais — não gerenciam o estado do seu contador."
    },
    {
      tema: "setState",
      pergunta: "De forma simples, o que o <code>setState()</code> faz?",
      opcoes: [
        "Ele grava o novo valor da variável de forma permanente na memória do celular, garantindo que o dado continue existindo mesmo depois que o aplicativo for totalmente fechado.",
        "Ele avisa o Flutter que alguma variável de estado mudou, fazendo o método <code>build()</code> ser executado novamente e a tela ser redesenhada com os novos valores atualizados.",
        "Ele cria uma nova tela já com os valores atualizados e navega automaticamente até ela, substituindo a tela antiga que ainda exibia os valores desatualizados ao usuário.",
        "Ele reinicia o widget do zero, apagando todas as variáveis declaradas na classe e devolvendo a tela ao estado inicial que foi definido no momento da sua criação."
      ],
      correta: 1,
      explicacao: "<code>setState</code> = \"ei Flutter, mudei algo, redesenha a tela\". Não salva nada em disco, não navega e não apaga variáveis."
    },
    {
      tema: "Navigator",
      pergunta: "Qual comando abre uma nova tela no Flutter?",
      opcoes: [
        "<code>Navigator.push(context, MaterialPageRoute(builder: (context) =&gt; NovaTela()))</code>, que empilha a nova tela por cima da atual na pilha de navegação do aplicativo.",
        "<code>Scaffold.open(context, NovaTela())</code>, método do próprio Scaffold que fecha a estrutura visual da tela atual e abre uma nova estrutura completa no lugar dela.",
        "<code>setState(() =&gt; NovaTela())</code>, já que a mudança de tela é considerada uma mudança de estado e por isso deve passar pelo mecanismo padrão de rebuild do framework.",
        "<code>MaterialApp.route(context, NovaTela())</code>, que registra a nova tela na tabela de rotas do aplicativo e em seguida a exibe imediatamente para o usuário final."
      ],
      correta: 0,
      explicacao: "<code>Navigator.push</code> com <code>MaterialPageRoute</code> é a forma padrão de empilhar uma nova tela. Os outros métodos simplesmente não existem no framework."
    },
    {
      tema: "Navigator",
      pergunta: "E para voltar para a tela anterior?",
      opcoes: [
        "<code>Navigator.pop(context)</code>, que remove a tela atual do topo da pilha de navegação e devolve o usuário para a tela imediatamente anterior que estava aberta.",
        "<code>Navigator.back(context)</code>, método equivalente ao botão físico de voltar do Android e ao gesto de deslizar da borda esquerda para a direita nos aparelhos iOS.",
        "<code>Navigator.return(context)</code>, que encerra a rota atual e devolve o controle da navegação diretamente para a primeira tela que foi aberta no aplicativo.",
        "<code>Navigator.exit(context)</code>, que fecha a tela atual e, caso não exista nenhuma tela anterior na pilha, minimiza o aplicativo deixando-o em segundo plano."
      ],
      correta: 0,
      explicacao: "<code>pop</code> remove a tela atual da pilha e volta para a anterior. <code>back</code>, <code>return</code> e <code>exit</code> não existem no <code>Navigator</code>."
    },
    {
      tema: "TextEditingController",
      pergunta: "Para que serve o <code>TextEditingController</code>?",
      opcoes: [
        "Ele serve para ler e controlar o texto digitado em um <code>TextField</code> — por exemplo, recuperar o nome do cliente com <code>meuController.text</code> na hora de enviar o pedido.",
        "Ele valida automaticamente o formato de e-mails, senhas e telefones digitados nos formulários do aplicativo, dispensando qualquer verificação manual escrita no código.",
        "Ele cria animações de digitação letra por letra na tela, controlando a velocidade com que cada caractere do texto aparece gradualmente para o usuário durante a exibição.",
        "Ele formata o estilo visual dos textos exibidos no aplicativo, controlando propriedades como cor, fonte, tamanho e espaçamento de cada um dos campos da interface."
      ],
      correta: 0,
      explicacao: "É a ponte entre o campo e o código: <code>meuController.text</code> retorna o que foi digitado. Validação é papel do <code>validator</code>; estilo é papel do <code>TextStyle</code>."
    },
    {
      tema: "SnackBar",
      pergunta: "O que é um <code>SnackBar</code>?",
      opcoes: [
        "É uma mensagem temporária que aparece na parte de baixo da tela (por exemplo, \"Pedido enviado!\") e desaparece sozinha depois de alguns segundos, sem travar a interação.",
        "É um menu lateral que desliza a partir da borda esquerda da tela quando o usuário toca no ícone de três linhas localizado na AppBar do aplicativo em execução.",
        "É uma barra fixa de navegação exibida no rodapé do aplicativo, usada para alternar entre as seções principais, como o cardápio, a lista de pedidos e o perfil do usuário.",
        "É um alerta em formato de janela que aparece no centro da tela e bloqueia toda a interação do usuário até que ele toque em um dos botões de confirmação exibidos."
      ],
      correta: 0,
      explicacao: "SnackBar é o aviso rápido da base da tela. Menu lateral é o <code>Drawer</code>, barra fixa no rodapé é o <code>BottomNavigationBar</code> e alerta bloqueante é o <code>AlertDialog</code>."
    },
    {
      tema: "ListView",
      pergunta: "Qual widget é o mais indicado para exibir uma lista rolável de produtos do cardápio?",
      opcoes: [
        "O <code>ListView</code>, widget feito exatamente para exibir itens em sequência vertical, com rolagem automática sempre que o conteúdo ultrapassa a altura disponível da tela.",
        "O <code>Row</code>, que organiza os produtos lado a lado na horizontal e adiciona rolagem automática sempre que os itens não couberem na largura disponível do dispositivo.",
        "O <code>Stack</code>, que empilha os produtos um sobre o outro em camadas e permite ao usuário deslizar entre eles com o dedo, como se estivesse folheando um baralho.",
        "A <code>AppBar</code>, que exibe os itens do cardápio na barra superior da tela e os mantém sempre visíveis para o usuário, independentemente da rolagem do conteúdo."
      ],
      correta: 0,
      explicacao: "<code>ListView</code> já vem com rolagem vertical automática — é o widget clássico de listas. <code>Row</code> não rola sozinho, <code>Stack</code> sobrepõe e <code>AppBar</code> é só a barra do topo."
    },
    {
      tema: "BottomSheet",
      pergunta: "O que o <code>showModalBottomSheet</code> faz?",
      opcoes: [
        "Ele abre um painel que desliza de baixo para cima sobre a tela atual (por exemplo, com os detalhes do pedido), bloqueando o conteúdo que fica atrás até ser fechado.",
        "Ele fixa uma barra de menu permanente no rodapé do aplicativo, que permanece visível em todas as telas abertas até ser explicitamente removida pelo código do app.",
        "Ele abre uma nova tela em modo cheio por cima da tela atual, funcionando de forma equivalente a um <code>Navigator.push</code> porém com animação de baixo para cima.",
        "Ele exibe uma notificação na barra de sistema do celular, que fica visível para o usuário mesmo quando o aplicativo está fechado ou rodando em segundo plano."
      ],
      correta: 0,
      explicacao: "É o painel deslizante da parte de baixo, muito usado pra detalhes e confirmações. Não é tela cheia, não é barra fixa (<code>BottomNavigationBar</code>) e não mexe com notificações do sistema."
    }
  ];

  /* =========================== MODO MÉDIO =========================== */
  const medio = [
    {
      tema: "Stateful · estrutura",
      pergunta: "Em um <code>StatefulWidget</code>, onde as variáveis de estado (ex.: <code>int total = 0;</code>) devem ser declaradas?",
      opcoes: [
        "Na classe que estende <code>State</code> (ex.: <code>_MinhaTelaState</code>), pois é ela que permanece viva entre os rebuilds e mantém os valores enquanto a tela existir na árvore.",
        "Na classe que estende <code>StatefulWidget</code>, pois é ela que representa a tela e por isso deve concentrar tanto os dados quanto a lógica de construção do layout.",
        "Dentro do método <code>build()</code>, para que as variáveis sejam recriadas a cada frame e a tela sempre reflita os valores mais recentes calculados pelo aplicativo.",
        "No <code>main()</code>, como variáveis globais, para que qualquer tela do aplicativo consiga acessar e modificar os valores livremente sem precisar passar parâmetros."
      ],
      correta: 0,
      explicacao: "O widget é recriado a cada rebuild; o objeto <code>State</code> permanece — por isso o estado mora nele. Dentro do <code>build()</code> a variável seria zerada a cada redesenho."
    },
    {
      tema: "setState",
      pergunta: "Um aluno fez <code>total++;</code> no <code>onPressed</code> do botão, mas <b>sem</b> chamar <code>setState</code>. O que acontece?",
      opcoes: [
        "A variável <code>total</code> muda normalmente na memória, mas a tela não é redesenhada, porque o Flutter não foi avisado de que precisa executar o <code>build()</code> novamente.",
        "O aplicativo lança uma exceção de estado inválido no console, pois alterar variáveis de estado fora de um <code>setState</code> é uma operação proibida pelo framework.",
        "A tela atualiza normalmente, pois o Flutter monitora todas as variáveis do <code>State</code> e o <code>setState</code> é apenas uma convenção opcional de legibilidade do código.",
        "O valor nem chega a mudar na memória, pois as variáveis declaradas dentro de um <code>State</code> são imutáveis e só podem ser alteradas dentro do callback apropriado."
      ],
      correta: 0,
      explicacao: "Sem <code>setState</code>, o valor muda \"por dentro\" mas a UI fica congelada no valor antigo. Não dá erro — o Flutter simplesmente não fica observando suas variáveis."
    },
    {
      tema: "Navigator · dados",

        "<code>ScaffoldMessenger.of(context).showSnackBar(SnackBar(...))</code>, pois o <code>ScaffoldMessenger</code> gerencia a fila de SnackBars independente da posição do <code>Scaffold</code>.",
        "<code>Navigator.of(context).showSnackBar(...)</code>, já que o SnackBar é internamente tratado como uma rota transparente que é empilhada por cima da tela atual.",
        "Instanciar o <code>SnackBar</code> diretamente no <code>body</code> do <code>Scaffold</code>, pois o widget se posiciona e se exibe sozinho assim que é adicionado à árvore de widgets."
      ],
      correta: 1,
      explicacao: "O <code>ScaffoldMessenger</code> gerencia SnackBars sem depender da posição exata do <code>Scaffold</code> na árvore — o método antigo via <code>Scaffold.of</code> foi descontinuado."
    },
    {
      tema: "SnackBar",
      pergunta: "Se dois <code>SnackBar</code>s forem disparados em sequência muito rápida, qual é o comportamento padrão do <code>ScaffoldMessenger</code>?",
      opcoes: [
        "Os dois aparecem sobrepostos na tela ao mesmo tempo, um por cima do outro, e cada um desaparece de forma independente ao fim da sua respectiva duração configurada.",
        "O segundo entra em uma fila e é exibido após o primeiro terminar — ou você pode chamar <code>hideCurrentSnackBar()</code> / <code>removeCurrentSnackBar()</code> antes de mostrar o novo.",
        "O aplicativo lança uma exceção de SnackBar duplicado, pois o <code>ScaffoldMessenger</code> não permite duas requisições de exibição registradas dentro do mesmo frame.",
        "Apenas o primeiro é exibido na tela e o segundo é descartado silenciosamente pelo framework, cabendo ao desenvolvedor reagendar manualmente a mensagem perdida."
      ],
      correta: 1,
      explicacao: "Fila por padrão. Pra pular a espera: <code>hideCurrentSnackBar()</code> ou <code>removeCurrentSnackBar()</code> antes de mostrar o novo."
    },
    {
      tema: "showModalBottomSheet",
      pergunta: "Sobre <code>showModalBottomSheet</code>, qual afirmação é verdadeira?",
      opcoes: [
        "Ele bloqueia toda a navegação do aplicativo até que o dispositivo seja reiniciado pelo usuário, sendo indicado somente para avisos críticos de segurança do sistema.",
        "Por padrão é modal (bloqueia interação com o conteúdo atrás até ser fechado) e retorna um <code>Future</code>, permitindo capturar um valor via <code>Navigator.pop(context, valor)</code>.",
        "Ele não pode conter widgets com estado próprio (<code>StatefulWidget</code>), pois o painel é reconstruído a cada frame de animação e perderia todos os valores internos.",
        "Ele substitui totalmente o <code>Scaffold</code> da tela atual enquanto permanece aberto, assumindo o controle da AppBar, do body e dos botões flutuantes existentes."
      ],
      correta: 1,
      explicacao: "Bloqueia o conteúdo atrás até fechar, e <code>Navigator.pop(context, valor)</code> dentro dele resolve o <code>Future</code> com esse valor. Pode conter StatefulWidget normalmente."
    },
    {
      tema: "AnimatedContainer",
      pergunta: "Por que, ao usar <code>AnimatedContainer</code>, é indispensável definir a propriedade <code>duration</code>?",
      opcoes: [
        "Porque sem a <code>duration</code> o container não pode receber cor de fundo nem decoração, já que essas propriedades dependem diretamente do sistema interno de animação.",
        "Porque ele é um widget de animação implícita: interpola automaticamente as mudanças de propriedades (tamanho, cor, borda, padding) ao longo do tempo definido em <code>duration</code>.",
        "Porque a <code>duration</code> é opcional na prática e afeta somente a transição da cor de fundo, sendo completamente ignorada nas mudanças de tamanho e de posição.",
        "Porque a <code>duration</code> define o intervalo mínimo exigido entre chamadas consecutivas de <code>setState</code>, protegendo a animação contra rebuilds excessivos da tela."
      ],
      correta: 1,
      explicacao: "Ele interpola automaticamente as mudanças de tamanho, cor, borda e padding — mas precisa saber em quanto tempo a transição deve acontecer. Por isso <code>duration</code> é obrigatória."
    },
    {
      tema: "AnimatedContainer",
      pergunta: "O que diferencia <code>AnimatedContainer</code> de simplesmente usar um <code>Container</code> normal dentro de um <code>setState</code>?",
      opcoes: [
        "Não há diferença nenhuma entre os dois na prática: ambos redesenham a interface exatamente da mesma forma quando uma propriedade visual do widget é alterada.",
        "Com <code>Container</code> + <code>setState</code>, a mudança acontece instantaneamente entre frames; o <code>AnimatedContainer</code> anima a transição entre os valores usando uma <code>curve</code>.",
        "O <code>AnimatedContainer</code> não aceita <code>BoxDecoration</code> nem bordas arredondadas, uma limitação imposta pelo seu mecanismo interno de interpolação de valores.",
        "É o oposto do esperado: o <code>Container</code> comum sempre anima as suas mudanças, enquanto o <code>AnimatedContainer</code> exige um controller manual para poder animar."
      ],
      correta: 1,
      explicacao: "Com <code>Container</code> a mudança salta entre frames; o <code>AnimatedContainer</code> anima a transição do valor antigo pro novo — e aceita <code>BoxDecoration</code> normalmente."
    },
    {
      tema: "Column × ListView",
      pergunta: "Qual é a principal diferença de comportamento (e performance) entre <code>Column</code> dentro de <code>SingleChildScrollView</code> e um <code>ListView</code> para exibir os 4+ produtos do cardápio?",
      opcoes: [
        "São idênticos em comportamento e em performance: ambos constroem e renderizam os widgets filhos exatamente da mesma forma, mudando apenas a sintaxe utilizada no código.",
        "<code>Column</code>/<code>SingleChildScrollView</code> constrói <b>todos</b> os filhos de uma vez, visíveis ou não; <code>ListView.builder</code> constrói os itens <b>sob demanda</b> (lazy loading).",
        "<code>ListView</code> não pode ser rolado pelo usuário — a rolagem é uma exclusividade do <code>SingleChildScrollView</code>, que existe no framework justamente para essa finalidade.",
        "<code>SingleChildScrollView</code> é mais rápido que <code>ListView</code> para qualquer quantidade de itens, pois não precisa gerenciar o ciclo de vida dos builders de cada item."
      ],
      correta: 1,
      explicacao: "O lazy loading do <code>ListView.builder</code> só constrói o que está visível — decisivo em listas longas. Com 4 itens tanto faz; com 400, faz toda a diferença."
    },
    {
      tema: "Arquitetura",
      pergunta: "Um colega colocou toda a lógica da tela num único <code>main.dart</code> com 2000+ linhas, sem widgets personalizados. Qual é o <b>principal problema técnico</b> (além de legibilidade)?",
      opcoes: [
        "O aplicativo não compila com mais de 500 linhas por arquivo, um limite imposto pelo analisador do Dart justamente para forçar a modularização adequada do código.",
        "Widgets monolíticos reconstroem blocos inteiros de UI a cada <code>setState</code>, pois o Flutter reconstrói toda a subárvore do <code>build()</code>; widgets menores isolam rebuilds.",
        "Arquivos <code>.dart</code> têm um limite técnico de 2000 linhas imposto pelo compilador, e ultrapassar esse número gera avisos de performance no console durante o build.",
        "Não há nenhum problema técnico real nessa abordagem: a separação do código em widgets menores é apenas uma convenção estética adotada pela comunidade Flutter."
      ],
      correta: 1,
      explicacao: "O Flutter reconstrói toda a subárvore do <code>build()</code> do widget que chamou <code>setState</code> — separar em widgets menores (como <code>CardProduto</code>) isola rebuilds e permite reutilizar código. Não existe limite de linhas."
    }
  ];

  const modos = {
    facil:   { nome: "Fácil",   questoes: facil },
    medio:   { nome: "Médio",   questoes: medio },
    dificil: { nome: "Difícil", questoes: dificil }
  };

  const temasChips = ["Scaffold", "setState", "Navigator", "Controllers", "Validação", "SnackBar", "BottomSheet", "AnimatedContainer", "ListView", "Arquitetura"];

  let modoAtual = null;
  let questoes = [];
  let atual = 0;
  let acertos = 0;
  let ordemAtual = [];
  let respondida = false;
  let erros = [];
  let iniciado = false;

  const card = document.getElementById("card");
  const barra = document.getElementById("barra");
  const contador = document.getElementById("contador");
  const placar = document.getElementById("placar");

  function embaralhar(n) {
    const arr = [...Array(n).keys()];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function telaInicial() {
    iniciado = false;
    modoAtual = null;
    barra.style.width = "0%";
    contador.textContent = "";
    placar.textContent = "";
    card.innerHTML = `
      <div class="hero">
        <h1>&gt; Quiz Flutter<br><span>Lanchonete Express 🍔</span></h1>
        <p class="desc">Escolha o modo. Feedback e explicação na hora, questões erradas listadas no final. As alternativas embaralham a cada tentativa.</p>
        <div class="chips">${temasChips.map(t => `<span class="chip">${t}</span>`).join("")}</div>
        <div class="modos">
          <button class="modo facil" onclick="iniciar('facil')">
            <span class="m-icone">🟢</span>
            <span class="m-nome">Fácil</span>
            <span class="m-desc">10 questões · conceitos e definições básicas</span>
          </button>
          <button class="modo medio" onclick="iniciar('medio')">
            <span class="m-icone">🟠</span>
            <span class="m-nome">Médio</span>
            <span class="m-desc">10 questões · aplicação prática no código</span>
          </button>
          <button class="modo dificil" onclick="iniciar('dificil')">
            <span class="m-icone">🔴</span>
            <span class="m-nome">Difícil</span>
            <span class="m-desc">20 questões · ciclo de vida, performance e pegadinhas</span>
          </button>
        </div>
        <p class="dica-teclado">atalhos: 1/2/3 escolhe o modo · 1–4 responde · Enter avança</p>
      </div>
    `;
  }

  function iniciar(modo) {
    modoAtual = modo;
    questoes = modos[modo].questoes;
    iniciado = true;
    atual = 0;
    acertos = 0;
    erros = [];
    mostrarQuestao();
  }

  function mostrarQuestao() {
    const q = questoes[atual];
    respondida = false;
    ordemAtual = embaralhar(q.opcoes.length);
    barra.style.width = `${(atual / questoes.length) * 100}%`;
    contador.textContent = `[${modos[modoAtual].nome.toLowerCase()}] questão ${String(atual + 1).padStart(2, "0")} / ${questoes.length}`;
    placar.textContent = `${acertos} acerto${acertos === 1 ? "" : "s"}`;
    card.innerHTML = `
      <span class="tema">◆ ${q.tema}</span>
      <div class="pergunta">${q.pergunta}</div>
      ${ordemAtual.map((idxOriginal, pos) => `
        <button class="opcao" data-pos="${pos}" onclick="responder(${idxOriginal})">
          <span class="letra">${String.fromCharCode(65 + pos)}</span>
          <span class="txt">${q.opcoes[idxOriginal]}</span>
        </button>`).join("")}
      <div class="explicacao" id="explicacao"></div>
      <button class="botao" id="proxima" onclick="proxima()">Próxima →</button>
    `;
  }

  function responder(idxOriginal) {
    if (respondida) return;
    respondida = true;
    const q = questoes[atual];
    const botoes = card.querySelectorAll(".opcao");
    botoes.forEach(b => b.disabled = true);

    const posCorreta = ordemAtual.indexOf(q.correta);
    const posClicada = ordemAtual.indexOf(idxOriginal);
    const acertou = idxOriginal === q.correta;

    botoes[posCorreta].classList.add("correta");
    botoes.forEach((b, i) => {
      if (i !== posCorreta && i !== posClicada) b.classList.add("apagada");
    });

    const exp = document.getElementById("explicacao");
    if (acertou) {
      acertos++;
      exp.innerHTML = `<span class="tag">✓ ACERTOU</span>${q.explicacao}`;
    } else {
      botoes[posClicada].classList.add("errada");
      exp.classList.add("err");
      exp.innerHTML = `<span class="tag">✗ ERROU</span>${q.explicacao}`;
      erros.push(q);
    }
    exp.style.display = "block";

    const btn = document.getElementById("proxima");
    if (atual === questoes.length - 1) btn.textContent = "Ver resultado →";
    btn.classList.add("mostrar");
    placar.textContent = `${acertos} acerto${acertos === 1 ? "" : "s"}`;
  }

  function proxima() {
    atual++;
    if (atual < questoes.length) mostrarQuestao();
    else mostrarResultado();
  }

  function mostrarResultado() {
    barra.style.width = "100%";
    contador.textContent = `[${modos[modoAtual].nome.toLowerCase()}] resultado`;
    placar.textContent = "";
    const pct = Math.round((acertos / questoes.length) * 100);
    let veredito, sub;
    if (pct >= 90)      { veredito = "Monstro. 🏆";                sub = modoAtual === "dificil" ? "Pode fazer a prova de olhos fechados." : "Bora subir de nível — tenta o próximo modo."; }
    else if (pct >= 70) { veredito = "Tá pronto pra prova. 🍔";    sub = "Só dá uma olhada nos erros abaixo."; }
    else if (pct >= 50) { veredito = "Na média, mas dá pra mais."; sub = "Revisa os tópicos das questões erradas."; }
    else                { veredito = "Volta pra teoria. 📚";       sub = "Refaz o quiz depois de revisar — as alternativas embaralham."; }

    card.innerHTML = `
      <div class="resultado">
        <div class="anel" style="--pct: ${pct}">
          <span class="num">${acertos}/${questoes.length}</span>
          <span class="sub">${pct}%</span>
        </div>
        <p class="veredito">${veredito}</p>
        <p class="veredito-sub">${sub}</p>
        <button class="botao mostrar" onclick="iniciar(modoAtual)">Refazer ↻</button>
        <button class="botao secundario mostrar" onclick="telaInicial()">Trocar modo</button>
      </div>
      ${erros.length ? `
        <div class="revisao">
          <h3>Pra revisar (${erros.length})</h3>
          ${erros.map(q => `
            <div class="rev-item">
              <div class="q">◆ [${q.tema}] ${q.pergunta.split("<pre>")[0]}</div>
              <div class="r"><b>Resposta:</b> ${q.opcoes[q.correta]}</div>
            </div>`).join("")}
        </div>` : ""}
    `;
  }

  document.addEventListener("keydown", (e) => {
    if (!iniciado) {
      if (e.key === "1") iniciar("facil");
      else if (e.key === "2") iniciar("medio");
      else if (e.key === "3") iniciar("dificil");
      return;
    }
    if (!respondida && ["1","2","3","4"].includes(e.key)) {
      const pos = parseInt(e.key) - 1;
      if (pos < ordemAtual.length) responder(ordemAtual[pos]);
    } else if (respondida && e.key === "Enter") {
      proxima();
    }
  });

  telaInicial();
</script>
</body>
</html>
